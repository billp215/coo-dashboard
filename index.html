<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COO Executive Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>COO Executive Dashboard</h1>
    </header>
    <main>
        <section>
            <h2>Key Performance Indicators</h2>
            <div id="kpi-container">
                <div class="kpi">
                    <h3>Sales Growth</h3>
                    <p>20%</p>
                </div>
                <div class="kpi">
                    <h3>Customer Satisfaction</h3>
                    <p>95%</p>
                </div>
                <div class="kpi">
                    <h3>Operational Efficiency</h3>
                    <p>85%</p>
                </div>
            </div>
        </section>
        <section>
            <h2>Recent Activities</h2>
            <ul id="activity-list">
                <li>Reviewed quarterly budget.</li>
                <li>Met with department heads.</li>
                <li>Launched new marketing campaign.</li>
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 COO Dashboard</p>
    </footer>
</body>
</html>
